<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="kardon">
        <h1>Weather App</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Shaharni kiriting...">
            <button id="searchBtn">Find</button>
        </div>

        <div class="weather-info" id="weatherInfo">
            <h2 id="location">Tashkent, Uzbekistan</h2>
            <img id="icon" src="https://openweathermap.org/img/wn/10d@2x.png" alt="weather icon">
            <div class="temp"><span id="temperature">4.7</span>°C</div>
            <p id="description">Patchy Rain Nearby</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
